<svg width="1280" height="720" viewBox="0 0 1280 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="paper">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="3" result="noise"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" in2="noise" mode="multiply"/>
    </filter>
    <filter id="wobble">
      <feTurbulence type="fractalNoise" baseFrequency="0.015" numOctaves="2" seed="7" result="rough"/>
      <feDisplacementMap in="SourceGraphic" in2="rough" scale="1.2"/>
    </filter>
    <style>
      .bg { fill: #fffdf7; }
      .ink { stroke: #1f2937; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }
      .thin { stroke: #1f2937; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
      .dash { stroke-dasharray: 8 9; }
      .muted { fill: #4b5563; }
      .title { fill: #111827; font: 700 34px "Pretendard", "Noto Sans KR", Arial, sans-serif; }
      .sub { fill: #374151; font: 500 18px "Pretendard", "Noto Sans KR", Arial, sans-serif; }
      .label { fill: #111827; font: 700 21px "Pretendard", "Noto Sans KR", Arial, sans-serif; }
      .small { fill: #374151; font: 500 15px "Pretendard", "Noto Sans KR", Arial, sans-serif; }
      .tiny { fill: #4b5563; font: 500 13px "Pretendard", "Noto Sans KR", Arial, sans-serif; }
      .green { fill: #dff7e8; }
      .blue { fill: #e6f0ff; }
      .yellow { fill: #fff3c4; }
      .red { fill: #ffe2df; }
      .purple { fill: #efe6ff; }
      .gray { fill: #f3f4f6; }
      .white { fill: #ffffff; }
    </style>
  </defs>

  <rect class="bg" width="1280" height="720"/>
  <g opacity="0.18" filter="url(#paper)">
    <path d="M0 64 C180 44 267 84 430 58 C607 30 704 86 874 62 C1044 38 1138 68 1280 48" stroke="#d6d3c7"/>
    <path d="M0 255 C172 238 276 268 436 246 C620 221 722 271 895 251 C1070 231 1158 258 1280 241" stroke="#d6d3c7"/>
    <path d="M0 508 C190 485 268 523 437 499 C605 475 709 527 875 504 C1045 480 1142 511 1280 492" stroke="#d6d3c7"/>
  </g>

  <text x="58" y="58" class="title">창고지기 WMS 아키텍처 스케치</text>
  <text x="60" y="88" class="sub">입고부터 출고, 반품까지 재고 정합성과 현장 작업 흐름을 분리해서 검증하는 구조</text>

  <g filter="url(#wobble)">
    <path class="ink" d="M53 117 L1222 111 L1211 660 L69 668 Z" fill="none"/>
    <path class="thin dash" d="M265 128 L265 644"/>
    <path class="thin dash" d="M760 128 L760 644"/>
    <path class="thin dash" d="M1010 128 L1010 644"/>
