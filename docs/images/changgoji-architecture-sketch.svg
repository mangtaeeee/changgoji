  <text x="1075" y="371" class="label">Print Agent</text>
  <text x="1072" y="398" class="small">송장 출력</text>
  <text x="1074" y="522" class="label">MSA 분리</text>
  <text x="1067" y="549" class="small">도메인 단위</text>

