  <text x="488" y="222" class="small">Controller · DTO · Validation · 공통 응답</text>
  <text x="363" y="261" class="small">GlobalExceptionHandler / Domain Exception / OpenAPI</text>

  <text x="350" y="390" class="label">Domain Services</text>
  <text x="344" y="426" class="small">Inbound → Inventory 증가 → Putaway 작업</text>
  <text x="344" y="455" class="small">Outbound → 재고 할당 → Picking Wave → Shipping</text>
  <text x="344" y="484" class="small">Returns → 검수 결과에 따라 재고 복구 또는 불량 이력</text>

