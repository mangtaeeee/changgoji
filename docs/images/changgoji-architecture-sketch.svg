  <text x="92" y="150" class="small">사용자/운영 도구</text>
  <text x="394" y="150" class="small">Spring Boot API</text>
  <text x="827" y="150" class="small">저장소/조회</text>
  <text x="1062" y="150" class="small">확장 경계</text>

