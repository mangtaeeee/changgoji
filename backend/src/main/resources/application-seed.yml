spring:
  main:
    web-application-type: none
  datasource:
    url: jdbc:postgresql://localhost:5432/changgoji
    username: changgoji
    password: changgoji
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
    show-sql: false
    open-in-view: false
  data:
    redis:
      host: localhost
      port: 6379

logging:
  level:
    org.hibernate.SQL: warn
    org.springframework.jdbc.core.JdbcTemplate: warn
