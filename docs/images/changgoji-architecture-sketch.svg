    <path d="M686 233 L701 242 L686 252" class="ink" fill="none"/>
    <path d="M781 356 L796 365 L783 376" class="ink" fill="none"/>
    <path d="M1036 222 L1051 232 L1036 242" class="thin" fill="none"/>
