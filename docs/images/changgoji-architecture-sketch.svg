  <text x="840" y="354" class="label">Redis</text>
  <text x="820" y="381" class="small">캐시 확장 지점</text>
  <text x="828" y="488" class="label">QueryDSL</text>
  <text x="815" y="515" class="small">조회 전용 Projection</text>

