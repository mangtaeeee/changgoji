  <text x="113" y="220" class="label">관리자 웹</text>
  <text x="104" y="247" class="small">React Console</text>
  <text x="111" y="352" class="label">Android PDA</text>
  <text x="102" y="379" class="small">입고/피킹/반품</text>
  <text x="116" y="489" class="label">Swagger</text>
  <text x="103" y="516" class="small">API 검증</text>

