spring:
  application:
    name: changgoji-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/changgoji}
    username: ${DB_USERNAME:changgoji}
    password: ${DB_PASSWORD:changgoji}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 100
    show-sql: false
    open-in-view: false
  data:
    redis:
      host: localhost
      port: 6379
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

server:
  port: 8080

springdoc:
  api-docs:
    enabled: ${SPRINGDOC_ENABLED:false}
    path: /v3/api-docs
  swagger-ui:
    enabled: ${SPRINGDOC_ENABLED:false}
    path: /swagger-ui.html

app:
  security:
    username: ${APP_SECURITY_USERNAME:admin}
    password: ${APP_SECURITY_PASSWORD:admin1234!}
